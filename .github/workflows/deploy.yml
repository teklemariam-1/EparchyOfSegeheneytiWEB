name: Deploy to Vercel

# ── Trigger ────────────────────────────────────────────────────────────────
# Only deploy after the CI workflow completes successfully on main.
# This guarantees lint, type-check, and unit tests pass before every release.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only one production deploy at a time — never cancel an in-progress deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy → Vercel Production
    runs-on: ubuntu-latest
    # Skip if CI did not succeed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 30
    environment:
      name: production
      url: https://www.segeneyti.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install dependencies
        run: npm ci

      # ── Pull production env vars & project metadata from Vercel ────────────
      # This writes .vercel/.env.production.local which `vercel build` will use.
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Load env vars from Vercel pull output ──────────────────────────────
      # vercel pull writes .vercel/.env.production.local; export vars for next steps
      - name: Export Vercel environment variables
        run: |
          if [ -f .vercel/.env.production.local ]; then
            grep -v '^#' .vercel/.env.production.local | grep -v '^$' >> $GITHUB_ENV
          fi

      # ── Run database migrations before the build ───────────────────────────
      # Runs against the production database using DATABASE_URI from Vercel env.
      # IMPORTANT: Payload migrate requires a direct (non-pooled) Neon connection.
      # Neon provides two URLs:
      #   - DATABASE_URI (pooled, pgBouncer) — used by the app at runtime
      #   - DATABASE_DIRECT_URL (direct, port 5432) — required for migrations
      # Add DATABASE_DIRECT_URL as a Vercel environment variable AND as a GitHub
      # secret, then uncomment the env override below.
      # continue-on-error: true means the deployment proceeds even if migrations
      # already applied (idempotent) or connection fails.
      - name: Run database migrations
        continue-on-error: true
        run: npm run migrate
        env:
          NODE_ENV: production
          # Uncomment to override with direct connection for migrations:
          # DATABASE_URI: ${{ secrets.DATABASE_DIRECT_URL }}

      # ── Build locally inside the Actions runner ─────────────────────────────
      # Use npm run vercel-build directly for full log visibility.
      # Output is captured to a file for error reporting.
      - name: Build
        id: build
        run: |
          set +e
          npm run vercel-build 2>&1 | tee /tmp/build_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -80 /tmp/build_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $BUILD_EXIT
        env:
          NODE_ENV: production
          SENTRY_AUTH_TOKEN: ''

      # ── Deploy to Vercel Production ────────────────────────────────────────
      # vercel deploy --prod uploads the source and lets Vercel build remotely.
      # Since vercel-build already ran (and .next/ is available), Vercel may
      # use its cache. This always produces a valid deployment URL.
      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -E '^https://' | tail -1)
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Smoke tests against the live deployment ─────────────────────────────
      # Give Vercel a moment to fully propagate the deploy.
      - name: Wait for deployment propagation
        run: sleep 10

      - name: Smoke test — home page (HTTP 200)
        run: |
          URL="${{ steps.deploy.outputs.deployment_url }}"
          status=$(curl -o /dev/null -s -w "%{http_code}" "$URL/")
          echo "Home: $status ($URL)"
          test "$status" = "200"

      - name: Smoke test — /sitemap.xml
        run: |
          URL="${{ steps.deploy.outputs.deployment_url }}"
          status=$(curl -o /dev/null -s -w "%{http_code}" "$URL/sitemap.xml")
          echo "Sitemap: $status"
          test "$status" = "200"

      - name: Smoke test — /robots.txt
        run: |
          URL="${{ steps.deploy.outputs.deployment_url }}"
          status=$(curl -o /dev/null -s -w "%{http_code}" "$URL/robots.txt")
          echo "Robots: $status"
          test "$status" = "200"

      - name: Smoke test — /api/health (Payload alive)
        run: |
          URL="${{ steps.deploy.outputs.deployment_url }}"
          status=$(curl -o /dev/null -s -w "%{http_code}" "$URL/api/health")
          echo "Health: $status"
          test "$status" = "200" || test "$status" = "404"
