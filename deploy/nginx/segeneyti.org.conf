# Nginx site configuration for the Catholic Eparchy of Segeneyti website
# Place at: /etc/nginx/sites-available/segeneyti.org
# Enable:   sudo ln -s /etc/nginx/sites-available/segeneyti.org \
#                      /etc/nginx/sites-enabled/segeneyti.org
#           sudo nginx -t && sudo systemctl reload nginx

# ── Redirect all plain HTTP → HTTPS ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name segeneyti.org www.segeneyti.org;

    # Challenge files for Let's Encrypt / Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.segeneyti.org$request_uri;
    }
}

# ── Redirect bare domain → www ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name segeneyti.org;

    ssl_certificate     /etc/letsencrypt/live/segeneyti.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/segeneyti.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.segeneyti.org$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.segeneyti.org;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/segeneyti.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/segeneyti.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Hardened TLS
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/segeneyti.access.log combined buffer=16k flush=2s;
    error_log  /var/log/nginx/segeneyti.error.log  warn;

    # ── Gzip ────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/atom+xml image/svg+xml
        font/woff font/woff2;

    # ── Request limits ──────────────────────────────────────────────────────────
    client_max_body_size 50M;   # Payload CMS file uploads
    client_body_timeout  30s;
    client_header_timeout 10s;

    # ── Static assets served by Next.js (_next/static) ──────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Immutable cache (Next.js content-hashes these filenames)
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status "STATIC";
    }

    # ── Public directory files ──────────────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|webp|svg|woff2|woff|ttf|pdf)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    # ── Payload CMS admin panel ─────────────────────────────────────────────────
    location /admin {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Restrict admin access to known IP ranges (optional — uncomment & configure)
        # allow 41.186.0.0/16;   # Eritrea Telecom
        # deny all;
    }

    # ── Payload REST/GraphQL API ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Cache-busting: never cache API responses at Nginx level
        add_header Cache-Control "no-store";
    }

    # ── All other Next.js routes ────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # ── Health check endpoint ───────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}
